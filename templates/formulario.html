<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .lang-flag { font-size: 20px; cursor: pointer; text-decoration: none; }
        
        .form-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h2 { color: #2c3e50; font-size: 24px; margin-bottom: 8px; text-align: center; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #2c3e50; font-weight: 600; font-size: 13px; margin-bottom: 5px; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        textarea { resize: vertical; min-height: 80px; }
        
        .checkbox-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            align-items: flex-start;
        }
        
        .checkbox-group input { width: 18px; height: 18px; margin: 0; cursor: pointer; flex-shrink: 0; }
        .checkbox-group label { margin: 0; font-size: 12px; color: #555; font-weight: normal; }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        
        button:hover { background: #5568d3; }
        
        .success-message {
            text-align: center;
            padding: 40px 20px;
        }
        
        .success-icon { font-size: 60px; margin-bottom: 15px; }
        .success-title { color: #27ae60; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .success-text { color: #666; margin-bottom: 25px; }
        
        .contact-button {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .contact-button:hover { background: #20ba5c; }
    </style>
</head>
<body>

<div class="lang-container">
    <a href="{{ url_for('cambiar_idioma', lang='es', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇪🇸</a>
    <a href="{{ url_for('cambiar_idioma', lang='en', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇺🇸</a>
    <a href="{{ url_for('cambiar_idioma', lang='fr', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇫🇷</a>
    <a href="{{ url_for('cambiar_idioma', lang='de', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇩🇪</a>
    <a href="{{ url_for('cambiar_idioma', lang='pt', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇵🇹</a>
    <a href="{{ url_for('cambiar_idioma', lang='zh', proximo='formulario', cliente_id=cliente_id) }}" class="lang-flag">🇨🇳</a>
</div>

<div class="form-container">
    {% if not enviado %}
    
    <h2>{{ textos.titulo_form }}</h2>
    <p class="subtitle">{{ textos.subtitulo_form }}</p>
    
    <form method="POST">
        <div class="form-group">
            <label>{{ textos.placeholder_nombre }}</label>
            <input type="text" name="nombre" required>
        </div>
        
        <div class="form-group">
            <label>{{ textos.placeholder_tel }}</label>
            <input type="tel" name="telefono" required>
        </div>
        
        <div class="form-group">
            <label>{{ textos.placeholder_zona }}</label>
            <input type="text" name="zona" required>
        </div>
        
        <div class="form-group">
            <label>{{ textos.placeholder_presupuesto }}</label>
            <input type="number" name="presupuesto" required>
        </div>
        
        <div class="form-group">
            <label>{{ textos.placeholder_propiedad }}</label>
            <textarea name="mensaje" required></textarea>
        </div>
        
        <div class="form-group">
            <label>Email (Opcional)</label>
            <input type="email" name="email">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="terminos" name="terminos" required>
            <label for="terminos">{{ textos.acepto_terminos }}</label>
        </div>
        
        <button type="submit">{{ textos.boton_enviar }}</button>
    </form>
    
    {% else %}
    
    <div class="success-message">
        <div class="success-icon">✅</div>
        <div class="success-title">{{ textos.mensaje_exito }}</div>
        <div class="success-text">{{ textos.subtitulo_exito }}</div>
        <a href="https://wa.me/{{ whatsapp }}" target="_blank" class="contact-button">💬 Contactar por WhatsApp</a>
    </div>
    
    {% endif %}
</div>

</body>
</html>
