<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente.nombre }} | Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="lang-container">
        <div class="lang-hint">
            Selecciona tu idioma <span>➜</span>
        </div>

        <div class="lang-selected">
            <span>🌐</span>
            <span style="text-transform: uppercase;">{{ session.get('idioma', 'es') }}</span>
        </div>
        <div class="lang-dropdown">
            <a href="{{ url_for('cambiar_idioma', lang='es', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇪🇸</span> Español</a>
            <a href="{{ url_for('cambiar_idioma', lang='en', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇺🇸</span> English</a>
            <a href="{{ url_for('cambiar_idioma', lang='fr', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇫🇷</span> Français</a>
            <a href="{{ url_for('cambiar_idioma', lang='de', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇩🇪</span> Deutsch</a>
            <a href="{{ url_for('cambiar_idioma', lang='pt', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇵🇹</span> Português</a>
            <a href="{{ url_for('cambiar_idioma', lang='zh', proximo='formulario', cliente_id=cliente.usuario) }}"><span>🇨🇳</span> 中文</a>
        </div>
    </div>

    {% if not enviado %}
    <form method="POST">
        <h2>{{ cliente.nombre }}</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">{{ textos.titulo_form }}</p>
        
        <input name="nombre" placeholder="{{ textos.placeholder_nombre }}" required>
        <input name="telefono" type="tel" placeholder="{{ textos.placeholder_tel }}" required>
        <input name="zona" placeholder="{{ textos.placeholder_zona }}" required>
        <input name="presupuesto" type="number" placeholder="{{ textos.placeholder_presupuesto }}" required>
        <textarea name="mensaje" placeholder="{{ textos.placeholder_propiedad }}" rows="3" required></textarea>
        
        <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; text-align: left;">
            <input type="checkbox" name="terminos" id="terminos" required style="width: 18px; height: 18px; margin: 0; cursor: pointer;">
            <label for="terminos" style="font-size: 11px; color: #555; line-height: 1.4; cursor: pointer;">
                {{ textos.acepto_terminos }}
            </label>
        </div>

        <button type="submit">{{ textos.boton_enviar }}</button>
    </form>
    {% else %}
    <div class="mensaje-exito">
        <h3 style="color: #28a745; margin-bottom: 10px;">{{ textos.mensaje_exito }}</h3>
        <p style="color: #666;">{{ textos.subtitulo_exito }}</p>
        <a href="{{ link_whatsapp }}" target="_blank" style="background:#25D366; color:white; padding:12px 25px; text-decoration:none; border-radius:8px; display: inline-block; margin-top: 20px; font-weight: bold; width: 80%;">
            WhatsApp
        </a>
    </div>
    {% endif %}
</body>
</html>
