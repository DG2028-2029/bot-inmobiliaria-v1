<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ cliente.nombre }} | Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    {% if not enviado %}
    <form method="POST">
        <h2>{{ cliente.nombre }}</h2>
        <p style="text-align: center; color: #666;">{{ textos.titulo_form }}</p>
        
        <input name="nombre" placeholder="{{ textos.placeholder_nombre }}" required>
        <input name="telefono" type="tel" placeholder="{{ textos.placeholder_tel }}" required>
        <input name="zona" placeholder="{{ textos.placeholder_zona }}" required>
        <input name="presupuesto" type="number" placeholder="{{ textos.placeholder_presupuesto }}" required>
        <textarea name="mensaje" placeholder="{{ textos.placeholder_propiedad }}" rows="3" required></textarea>
        
        <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; text-align: left;">
            <input type="checkbox" name="terminos" id="terminos" required style="width: 20px; margin: 0;">
            <label for="terminos" style="font-size: 11px; color: #555;">
                {{ textos.acepto_terminos }}
            </label>
        </div>

        <button type="submit">{{ textos.boton_enviar }}</button>
    </form>
    {% else %}
    <div class="mensaje-exito" style="background:white; padding:40px; border-radius:15px; text-align:center;">
        <h3>{{ textos.mensaje_exito }} ({{ cliente.nombre }})</h3>
        <p>{{ textos.subtitulo_exito }}</p>
        <a href="{{ link_whatsapp }}" target="_blank" style="background:#25D366; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; display: inline-block; margin-top: 10px;">WhatsApp</a>
    </div>
    {% endif %}
</body>
</html>
