<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ cliente.nombre }} | Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    {% if not enviado %}
    <form method="POST">
        <h2>{{ cliente.nombre }}</h2>
        <p style="text-align: center; color: #666;">Por favor, llena tus datos para contactarte.</p>
        
        <input name="nombre" placeholder="Nombre completo" required>
        <input name="telefono" type="tel" placeholder="Teléfono" required>
        <input name="zona" placeholder="Zona de interés" required>
        <input name="presupuesto" type="number" placeholder="Presupuesto USD" required>
        <textarea name="mensaje" placeholder="¿Qué propiedad busca?" rows="3" required></textarea>
        
        <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; text-align: left;">
            <input type="checkbox" name="terminos" id="terminos" required style="width: 20px; margin: 0;">
            <label for="terminos" style="font-size: 11px; color: #555;">
                Acepto el tratamiento de mis datos personales según la política de privacidad.
            </label>
        </div>

        <button type="submit">Enviar Información</button>
    </form>
    {% else %}
    <div class="mensaje-exito" style="background:white; padding:40px; border-radius:15px; text-align:center;">
        <h3>¡Recibido por {{ cliente.nombre }}!</h3>
        <p>Nos pondremos en contacto pronto.</p>
        <a href="{{ link_whatsapp }}" target="_blank" style="background:#25D366; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; display: inline-block; margin-top: 10px;">WhatsApp</a>
    </div>
    {% endif %}
</body>
</html>
