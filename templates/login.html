<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ textos.login_titulo }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <style>
        /* Estilo para las banderas (igual que en el formulario) */
        .selector-idioma {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .bandera {
            font-size: 24px;
            text-decoration: none;
            transition: transform 0.2s;
            display: inline-block;
        }
        .bandera:hover {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="selector-idioma">
        <a href="{{ url_for('cambiar_idioma', lang='es', proximo='login', cliente_id=cliente.usuario) }}" class="bandera" title="Español">🇬🇹</a>
        <a href="{{ url_for('cambiar_idioma', lang='en', proximo='login', cliente_id=cliente.usuario) }}" class="bandera" title="English">🇺🇸</a>
        <a href="{{ url_for('cambiar_idioma', lang='fr', proximo='login', cliente_id=cliente.usuario) }}" class="bandera" title="Français">🇫🇷</a>
    </div>

    <form method="POST">
        <h2>{{ textos.login_titulo }}</h2>
        
        <input name="usuario" placeholder="{{ 'Usuario' if session.get('idioma') == 'es' else 'Username' if session.get('idioma') == 'en' else 'Nom d\'utilisateur' }}" required>
        <input type="password" name="password" placeholder="{{ 'Contraseña' if session.get('idioma') == 'es' else 'Password' if session.get('idioma') == 'en' else 'Mot de passe' }}" required>
        
        <button>{{ textos.login_boton if textos.login_boton else 'Entrar' }}</button>
        
        {% if error %}
            <p style="color:red; margin-top:15px;">{{ error }}</p>
        {% endif %}
    </form>
</body>
</html>
