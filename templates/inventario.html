<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente_nombre }} - Inventario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; background: white; padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 { color: #2c3e50; font-size: 24px; }
        .header-buttons { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-nuevo { background: #27ae60; color: white; }
        .btn-nuevo:hover { background: #229954; transform: translateY(-2px); }
        .btn-volver { background: #95a5a6; color: white; }
        .btn-volver:hover { background: #7f8c8d; }
        .propiedades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .propiedad-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s;
        }
        .propiedad-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        /* GALERÍA */
        .galeria {
            position: relative; width: 100%; height: 210px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        .galeria img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.4s;
        }
        .galeria img.activa { opacity: 1; }
        .galeria-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: white;
        }
        .galeria-nav {
            position: absolute; bottom: 8px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 6px;
        }
        .galeria-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.5); cursor: pointer; border: none;
            transition: background 0.3s;
        }
        .galeria-dot.activo { background: white; }
        .galeria-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.4); color: white; border: none;
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .galeria-btn.prev { left: 8px; }
        .galeria-btn.next { right: 8px; }
        .contador-fotos {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.5); color: white;
            font-size: 11px; padding: 3px 8px; border-radius: 10px;
        }

        .propiedad-contenido { padding: 18px; }
        .propiedad-titulo { font-size: 17px; font-weight: bold; color: #2c3e50; margin-bottom: 6px; }
        .propiedad-precio { font-size: 20px; color: #27ae60; font-weight: bold; margin-bottom: 8px; }
        .propiedad-ubicacion { color: #666; font-size: 13px; margin-bottom: 10px; }
        .propiedad-descripcion {
            color: #555; font-size: 13px; line-height: 1.5; margin-bottom: 14px;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .card-botones { display: flex; gap: 8px; margin-top: 10px; }
        .btn-ver {
            flex: 1; padding: 9px; background: #3498db; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .btn-ver:hover { background: #2980b9; }
        .btn-editar {
            flex: 1; padding: 9px; background: #f39c12; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .btn-editar:hover { background: #e67e22; }
        .btn-eliminar {
            flex: 1; padding: 9px; background: #e74c3c; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .btn-eliminar:hover { background: #c0392b; }
        .vacio {
            text-align: center; padding: 60px 20px; background: white;
            border-radius: 12px; color: #95a5a6; grid-column: 1/-1;
        }

        /* MODALES */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); overflow-y: auto;
        }
        .modal-contenido {
            background-color: white; margin: 4% auto; padding: 30px;
            border-radius: 12px; width: 90%; max-width: 600px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px;
        }
        .close { font-size: 28px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #2c3e50; font-weight: bold; font-size: 13px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #bdc3c7;
            border-radius: 6px; font-family: Arial, sans-serif; font-size: 13px;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }

        /* UPLOAD FOTOS */
        .upload-area {
            border: 2px dashed #bdc3c7; border-radius: 8px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.3s; background: #f8f9fa;
        }
        .upload-area:hover { border-color: #667eea; background: #f0f4ff; }
        .upload-area input[type="file"] { display: none; }
        .upload-icon { font-size: 36px; margin-bottom: 8px; }
        .upload-texto { color: #666; font-size: 13px; }
        .upload-sub { color: #999; font-size: 11px; margin-top: 4px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
        .preview-item { position: relative; border-radius: 6px; overflow: hidden; height: 80px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove {
            position: absolute; top: 3px; right: 3px;
            background: rgba(231,76,60,0.9); color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-enviar {
            width: 100%; padding: 12px; background: #667eea; color: white;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; margin-top: 5px;
        }
        .btn-enviar:hover { background: #5568d3; }
        .btn-enviar:disabled { background: #bdc3c7; cursor: not-allowed; }
        .progress-bar {
            display: none; width: 100%; height: 6px;
            background: #ecf0f1; border-radius: 3px; margin-top: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #667eea; border-radius: 3px;
            animation: progreso 2s ease-in-out infinite;
        }
        @keyframes progreso { 0% { width: 0%; } 70% { width: 85%; } 100% { width: 95%; } }

        /* MODAL DETALLE */
        .detalle-galeria {
            width: 100%; height: 280px; border-radius: 10px; overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative; margin-bottom: 20px;
        }
        .detalle-galeria img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.4s;
        }
        .detalle-galeria img.activa { opacity: 1; }
        .detalle-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 64px;
        }
        .detalle-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .detalle-campo { background: #f8f9fa; padding: 12px; border-radius: 8px; }
        .detalle-campo-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .detalle-campo-valor { font-size: 15px; color: #2c3e50; font-weight: bold; }
        .detalle-descripcion { background: #f8f9fa; padding: 14px; border-radius: 8px; font-size: 13px; color: #555; line-height: 1.6; }

        /* FOTOS EXISTENTES EN EDICIÓN */
        .fotos-existentes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .foto-existente { position: relative; height: 70px; border-radius: 6px; overflow: hidden; }
        .foto-existente img { width: 100%; height: 100%; object-fit: cover; }
        .foto-existente-badge {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5); color: white; font-size: 10px;
            text-align: center; padding: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>📦 Inventario de Propiedades</h1>
            <p style="color: #666; margin-top: 5px;">{{ cliente_nombre }}</p>
        </div>
        <div class="header-buttons">
            <button class="btn btn-nuevo" onclick="abrirModal()">➕ Agregar Propiedad</button>
            <a href="/historial/{{ cliente_id }}" class="btn btn-volver">← Volver</a>
        </div>
    </div>
    <div id="propiedades-container" class="propiedades-grid"></div>
</div>

<!-- MODAL AGREGAR -->
<div id="modalAgregar" class="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2>➕ Agregar Nueva Propiedad</h2>
            <span class="close" onclick="cerrarModal()">&times;</span>
        </div>
        <form id="formPropiedad" method="POST" action="/agregar_propiedad/{{ cliente_id }}" enctype="multipart/form-data">
            <div class="form-group">
                <label>Título de la Propiedad *</label>
                <input type="text" name="titulo" required placeholder="Ej: Casa en Zona 10">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" placeholder="Detalles de la propiedad..."></textarea>
            </div>
            <div class="form-group">
                <label>Precio (USD) *</label>
                <input type="number" name="precio" required step="0.01" placeholder="250000">
            </div>
            <div class="form-group">
                <label>Ubicación *</label>
                <input type="text" name="ubicacion" required placeholder="Ej: Zona 14, Ciudad de Guatemala">
            </div>
            <div class="form-group">
                <label>Fotos de la Propiedad (máx. 6)</label>
                <div class="upload-area" onclick="document.getElementById('inputFotos').click()">
                    <input type="file" id="inputFotos" name="imagenes" multiple accept="image/*" onchange="previsualizarFotos(this)">
                    <div class="upload-icon">📸</div>
                    <div class="upload-texto">Click para subir fotos</div>
                    <div class="upload-sub">JPG, PNG, WEBP · Máximo 6 fotos</div>
                </div>
                <div id="previewGrid" class="preview-grid"></div>
            </div>
            <button type="submit" class="btn-enviar" id="btnGuardar">💾 Guardar Propiedad</button>
            <div class="progress-bar" id="progressBar"><div class="progress-fill"></div></div>
        </form>
    </div>
</div>

<!-- MODAL DETALLE -->
<div id="modalDetalle" class="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2 id="detalleTitulo">Detalle de Propiedad</h2>
            <span class="close" onclick="cerrarDetalle()">&times;</span>
        </div>
        <div id="detalleGaleria" class="detalle-galeria"></div>
        <div class="detalle-info">
            <div class="detalle-campo">
                <div class="detalle-campo-label">Precio</div>
                <div class="detalle-campo-valor" id="detallePrecio"></div>
            </div>
            <div class="detalle-campo">
                <div class="detalle-campo-label">Ubicación</div>
                <div class="detalle-campo-valor" id="detalleUbicacion"></div>
            </div>
        </div>
        <div class="detalle-descripcion" id="detalleDescripcion"></div>
    </div>
</div>

<!-- MODAL EDITAR -->
<div id="modalEditar" class="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2>✏️ Editar Propiedad</h2>
            <span class="close" onclick="cerrarEditar()">&times;</span>
        </div>
        <form id="formEditar" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Título *</label>
                <input type="text" name="titulo" id="editTitulo" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" id="editDescripcion"></textarea>
            </div>
            <div class="form-group">
                <label>Precio (USD) *</label>
                <input type="number" name="precio" id="editPrecio" required step="0.01">
            </div>
            <div class="form-group">
                <label>Ubicación *</label>
                <input type="text" name="ubicacion" id="editUbicacion" required>
            </div>
            <div class="form-group">
                <label>Fotos actuales</label>
                <div id="fotosExistentes" class="fotos-existentes"></div>
            </div>
            <div class="form-group">
                <label>Reemplazar fotos (opcional)</label>
                <div class="upload-area" onclick="document.getElementById('inputFotosEdit').click()">
                    <input type="file" id="inputFotosEdit" name="imagenes" multiple accept="image/*" onchange="previsualizarFotosEdit(this)">
                    <div class="upload-icon">📸</div>
                    <div class="upload-texto">Click para subir fotos nuevas</div>
                    <div class="upload-sub">Si subes fotos nuevas reemplazará las actuales</div>
                </div>
                <div id="previewGridEdit" class="preview-grid"></div>
            </div>
            <button type="submit" class="btn-enviar" id="btnEditar">💾 Guardar Cambios</button>
            <div class="progress-bar" id="progressBarEdit"><div class="progress-fill"></div></div>
        </form>
    </div>
</div>

<script>
    const clienteId = "{{ cliente_id }}";
    let propiedadesData = [];

    document.addEventListener('DOMContentLoaded', cargarPropiedades);

    window.onclick = function(e) {
        if (e.target == document.getElementById("modalAgregar")) cerrarModal();
        if (e.target == document.getElementById("modalDetalle")) cerrarDetalle();
        if (e.target == document.getElementById("modalEditar")) cerrarEditar();
    }

    function abrirModal() { document.getElementById("modalAgregar").style.display = "block"; }
    function cerrarModal() {
        document.getElementById("modalAgregar").style.display = "none";
        document.getElementById("formPropiedad").reset();
        document.getElementById("previewGrid").innerHTML = "";
    }
    function cerrarDetalle() { document.getElementById("modalDetalle").style.display = "none"; }
    function cerrarEditar() { document.getElementById("modalEditar").style.display = "none"; }

    function previsualizarFotos(input) {
        const archivos = Array.from(input.files).slice(0, 6);
        const grid = document.getElementById("previewGrid");
        grid.innerHTML = "";
        archivos.forEach((archivo, i) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                grid.innerHTML += `<div class="preview-item" id="preview-${i}">
                    <img src="${e.target.result}">
                    <button type="button" class="preview-remove" onclick="document.getElementById('preview-${i}').remove()">✕</button>
                </div>`;
            };
            reader.readAsDataURL(archivo);
        });
    }

    function previsualizarFotosEdit(input) {
        const archivos = Array.from(input.files).slice(0, 6);
        const grid = document.getElementById("previewGridEdit");
        grid.innerHTML = "";
        archivos.forEach((archivo, i) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                grid.innerHTML += `<div class="preview-item">
                    <img src="${e.target.result}">
                </div>`;
            };
            reader.readAsDataURL(archivo);
        });
    }

    document.getElementById("formPropiedad").addEventListener("submit", function() {
        document.getElementById("btnGuardar").disabled = true;
        document.getElementById("btnGuardar").textContent = "⏳ Subiendo fotos...";
        document.getElementById("progressBar").style.display = "block";
    });

    document.getElementById("formEditar").addEventListener("submit", function() {
        document.getElementById("btnEditar").disabled = true;
        document.getElementById("btnEditar").textContent = "⏳ Guardando...";
        document.getElementById("progressBarEdit").style.display = "block";
    });

    function verDetalle(propId) {
        const prop = propiedadesData.find(p => p.id == propId);
        if (!prop) return;

        let imagenes = [];
        try { imagenes = JSON.parse(prop.imagen_url || '[]'); } catch(e) {
            if (prop.imagen_url && prop.imagen_url.startsWith('http')) imagenes = [prop.imagen_url];
        }

        document.getElementById("detalleTitulo").textContent = prop.titulo;
        document.getElementById("detallePrecio").textContent = "$" + parseFloat(prop.precio).toLocaleString();
        document.getElementById("detalleUbicacion").textContent = "📍 " + prop.ubicacion;
        document.getElementById("detalleDescripcion").textContent = prop.descripcion || 'Sin descripción';

        const galeriaEl = document.getElementById("detalleGaleria");
        if (imagenes.length > 0) {
            let fotoIdx = 0;
            galeriaEl.innerHTML = imagenes.map((url, i) =>
                `<img src="${url}" class="${i===0?'activa':''}" alt="foto ${i+1}">`
            ).join('') + (imagenes.length > 1 ? `
                <button class="galeria-btn prev" onclick="cambiarDetalleImg(-1, ${imagenes.length})">‹</button>
                <button class="galeria-btn next" onclick="cambiarDetalleImg(1, ${imagenes.length})">›</button>
                <div class="contador-fotos">1/${imagenes.length}</div>
            ` : '');
        } else {
            galeriaEl.innerHTML = `<div class="detalle-placeholder">🏠</div>`;
        }

        document.getElementById("modalDetalle").style.display = "block";
    }

    let detalleIdx = 0;
    function cambiarDetalleImg(dir, total) {
        const galeria = document.getElementById("detalleGaleria");
        const imgs = galeria.querySelectorAll('img');
        const contador = galeria.querySelector('.contador-fotos');
        imgs[detalleIdx].classList.remove('activa');
        detalleIdx = (detalleIdx + dir + total) % total;
        imgs[detalleIdx].classList.add('activa');
        if (contador) contador.textContent = `${detalleIdx+1}/${total}`;
    }

    function abrirEditar(propId) {
        const prop = propiedadesData.find(p => p.id == propId);
        if (!prop) return;

        document.getElementById("editTitulo").value = prop.titulo;
        document.getElementById("editDescripcion").value = prop.descripcion || '';
        document.getElementById("editPrecio").value = prop.precio;
        document.getElementById("editUbicacion").value = prop.ubicacion;
        document.getElementById("formEditar").action = `/editar_propiedad/${clienteId}/${prop.id}`;
        document.getElementById("previewGridEdit").innerHTML = "";
        document.getElementById("btnEditar").disabled = false;
        document.getElementById("btnEditar").textContent = "💾 Guardar Cambios";

        let imagenes = [];
        try { imagenes = JSON.parse(prop.imagen_url || '[]'); } catch(e) {
            if (prop.imagen_url && prop.imagen_url.startsWith('http')) imagenes = [prop.imagen_url];
        }

        const fotosEl = document.getElementById("fotosExistentes");
        if (imagenes.length > 0) {
            fotosEl.innerHTML = imagenes.map((url, i) => `
                <div class="foto-existente">
                    <img src="${url}" alt="foto ${i+1}">
                    <div class="foto-existente-badge">Foto ${i+1}</div>
                </div>`).join('');
        } else {
            fotosEl.innerHTML = `<p style="color:#999;font-size:12px;">Sin fotos</p>`;
        }

        document.getElementById("modalEditar").style.display = "block";
    }

    function cargarPropiedades() {
        propiedadesData = {{ propiedades_json | safe }};
        const container = document.getElementById("propiedades-container");

        if (!propiedadesData || propiedadesData.length === 0) {
            container.innerHTML = `
                <div class="vacio">
                    <div style="font-size: 64px; margin-bottom: 20px;">📭</div>
                    <h2 style="color: #7f8c8d; margin-bottom: 10px;">No hay propiedades aún</h2>
                    <p>Comienza agregando tu primera propiedad</p>
                    <button class="btn btn-nuevo" onclick="abrirModal()" style="margin-top: 20px;">➕ Agregar Propiedad</button>
                </div>`;
            return;
        }

        container.innerHTML = propiedadesData.map(prop => {
            let imagenes = [];
            try { imagenes = JSON.parse(prop.imagen_url || '[]'); } catch(e) {
                if (prop.imagen_url && prop.imagen_url.startsWith('http')) imagenes = [prop.imagen_url];
            }

            const galeriaHTML = imagenes.length > 0 ? `
                <div class="galeria" id="galeria-${prop.id}">
                    ${imagenes.map((url, i) => `<img src="${url}" class="${i===0?'activa':''}" alt="foto ${i+1}">`).join('')}
                    ${imagenes.length > 1 ? `
                        <button class="galeria-btn prev" onclick="cambiarFoto('${prop.id}', -1)">‹</button>
                        <button class="galeria-btn next" onclick="cambiarFoto('${prop.id}', 1)">›</button>
                        <div class="galeria-nav">
                            ${imagenes.map((_, i) => `<button class="galeria-dot ${i===0?'activo':''}" onclick="irFoto('${prop.id}', ${i})"></button>`).join('')}
                        </div>
                        <div class="contador-fotos">1/${imagenes.length}</div>
                    ` : ''}
                </div>` :
                `<div class="galeria"><div class="galeria-placeholder">🏠</div></div>`;

            return `
                <div class="propiedad-card">
                    ${galeriaHTML}
                    <div class="propiedad-contenido">
                        <div class="propiedad-titulo">${prop.titulo}</div>
                        <div class="propiedad-precio">$${parseFloat(prop.precio).toLocaleString()}</div>
                        <div class="propiedad-ubicacion">📍 ${prop.ubicacion}</div>
                        <div class="propiedad-descripcion">${prop.descripcion || 'Sin descripción'}</div>
                        <div class="card-botones">
                            <button class="btn-ver" onclick="verDetalle(${prop.id})">🔍 Ver</button>
                            <button class="btn-editar" onclick="abrirEditar(${prop.id})">✏️ Editar</button>
                            <form method="POST" action="/eliminar_propiedad/${clienteId}/${prop.id}" style="flex:1">
                                <button type="submit" class="btn-eliminar" style="width:100%" onclick="return confirm('¿Eliminar?')">🗑️</button>
                            </form>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    const fotoActual = {};
    function cambiarFoto(propId, dir) {
        const galeria = document.getElementById(`galeria-${propId}`);
        const imgs = galeria.querySelectorAll('img');
        const dots = galeria.querySelectorAll('.galeria-dot');
        const contador = galeria.querySelector('.contador-fotos');
        if (!imgs.length) return;
        if (fotoActual[propId] === undefined) fotoActual[propId] = 0;
        imgs[fotoActual[propId]].classList.remove('activa');
        dots[fotoActual[propId]]?.classList.remove('activo');
        fotoActual[propId] = (fotoActual[propId] + dir + imgs.length) % imgs.length;
        imgs[fotoActual[propId]].classList.add('activa');
        dots[fotoActual[propId]]?.classList.add('activo');
        if (contador) contador.textContent = `${fotoActual[propId]+1}/${imgs.length}`;
    }

    function irFoto(propId, index) {
        const galeria = document.getElementById(`galeria-${propId}`);
        const imgs = galeria.querySelectorAll('img');
        const dots = galeria.querySelectorAll('.galeria-dot');
        const contador = galeria.querySelector('.contador-fotos');
        if (fotoActual[propId] === undefined) fotoActual[propId] = 0;
        imgs[fotoActual[propId]].classList.remove('activa');
        dots[fotoActual[propId]]?.classList.remove('activo');
        fotoActual[propId] = index;
        imgs[index].classList.add('activa');
        dots[index]?.classList.add('activo');
        if (contador) contador.textContent = `${index+1}/${imgs.length}`;
    }
</script>
</body>
</html>
