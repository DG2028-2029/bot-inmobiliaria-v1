<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente_nombre }} - Propiedades Disponibles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; background: white; padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 { color: #2c3e50; font-size: 24px; }
        .header p { color: #666; margin-top: 5px; }
        .btn-whatsapp {
            background: #25D366; color: white; text-decoration: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold;
            font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #20ba5c; transform: translateY(-2px); }

        .filtros-bar {
            background: white; padding: 16px 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .filtros-bar input {
            padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; font-family: inherit;
        }
        .filtros-bar input[type="text"] { flex: 2; min-width: 160px; }
        .filtros-bar input[type="number"] { flex: 1; min-width: 100px; }
        .filtros-bar input:focus { outline: none; border-color: #667eea; }
        .btn-limpiar-filtros {
            padding: 10px 16px; background: #95a5a6; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        .btn-limpiar-filtros:hover { background: #7f8c8d; }

        .propiedades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .propiedad-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s;
        }
        .propiedad-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        .galeria {
            position: relative; width: 100%; height: 200px;
            background: #1a1a2e; overflow: hidden;
        }
        .galeria img {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.4s;
        }
        .galeria img.activa { opacity: 1; }
        .galeria-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .galeria-nav {
            position: absolute; bottom: 8px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 6px; z-index: 2;
        }
        .galeria-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.5); cursor: pointer; border: none; transition: 0.3s;
        }
        .galeria-dot.activo { background: white; }
        .galeria-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            z-index: 2; transition: 0.2s;
        }
        .galeria-btn:hover { background: rgba(0,0,0,0.8); }
        .galeria-btn.prev { left: 8px; }
        .galeria-btn.next { right: 8px; }
        .contador-fotos {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.6); color: white;
            font-size: 11px; padding: 3px 8px; border-radius: 10px; z-index: 2;
        }

        .propiedad-contenido { padding: 18px; }
        .propiedad-titulo { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .propiedad-precio { font-size: 22px; color: #27ae60; font-weight: bold; margin-bottom: 10px; }
        .propiedad-ubicacion { color: #666; font-size: 13px; margin-bottom: 8px; }
        .propiedad-specs { display: flex; gap: 14px; margin-bottom: 10px; font-size: 12px; color: #666; }
        .propiedad-specs span { display: flex; align-items: center; gap: 4px; }
        .badge-disponible {
            display: inline-block; background: #eafaf1; color: #27ae60;
            font-size: 12px; font-weight: bold; padding: 4px 10px;
            border-radius: 20px; margin-bottom: 12px;
        }
        .propiedad-descripcion {
            color: #555; font-size: 13px; line-height: 1.5; margin-bottom: 14px;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .card-botones { display: flex; gap: 8px; }
        .btn-ver-detalle {
            flex: 1; padding: 10px; background: #667eea; color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-ver-detalle:hover { background: #5568d3; }
        .btn-consultar {
            flex: 1; padding: 10px; background: #25D366; color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: bold;
            text-decoration: none; text-align: center; transition: 0.3s;
        }
        .btn-consultar:hover { background: #20ba5c; }

        .vacio {
            text-align: center; padding: 60px 20px; background: white;
            border-radius: 12px; color: #95a5a6; grid-column: 1/-1;
        }
        .footer-texto {
            text-align: center; color: rgba(255,255,255,0.6);
            font-size: 12px; margin-top: 20px; padding-bottom: 20px;
        }

        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); overflow-y: auto;
        }
        .modal-contenido {
            background-color: white; margin: 4% auto; padding: 30px;
            border-radius: 12px; width: 90%; max-width: 620px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px;
        }
        .modal-header h2 { color: #2c3e50; font-size: 20px; }
        .close { font-size: 28px; font-weight: bold; color: #95a5a6; cursor: pointer; }

        .detalle-galeria {
            width: 100%; height: 300px; border-radius: 10px;
            background: #1a1a2e; position: relative; margin-bottom: 20px; overflow: hidden;
        }
        .detalle-galeria img {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.4s;
        }
        .detalle-galeria img.activa { opacity: 1; }
        .detalle-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; font-size: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .detalle-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .detalle-campo { background: #f8f9fa; padding: 12px; border-radius: 8px; }
        .detalle-campo-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .detalle-campo-valor { font-size: 16px; color: #2c3e50; font-weight: bold; }
        .detalle-specs {
            display: flex; gap: 16px; margin-bottom: 16px;
            background: #f8f9fa; padding: 12px; border-radius: 8px; flex-wrap: wrap;
        }
        .detalle-specs span { font-size: 13px; color: #2c3e50; font-weight: bold; display:flex; align-items:center; gap:5px; }
        .detalle-descripcion {
            background: #f8f9fa; padding: 14px; border-radius: 8px;
            font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 20px;
        }
        .btn-wa-detalle {
            width: 100%; padding: 14px; background: #25D366; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
            text-decoration: none; display: block; text-align: center; transition: 0.3s;
        }
        .btn-wa-detalle:hover { background: #20ba5c; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🏠 Propiedades Disponibles</h1>
            <p>{{ cliente_nombre }}</p>
        </div>
        <a href="https://wa.me/{{ whatsapp }}" target="_blank" class="btn-whatsapp">💬 Contactar por WhatsApp</a>
    </div>

    <div class="filtros-bar">
        <input type="text" id="filtroZona" placeholder="📍 Buscar por zona..." oninput="aplicarFiltros()">
        <input type="number" id="filtroPrecioMin" placeholder="Precio mín" oninput="aplicarFiltros()">
        <input type="number" id="filtroPrecioMax" placeholder="Precio máx" oninput="aplicarFiltros()">
        <button type="button" onclick="limpiarFiltros()" class="btn-limpiar-filtros">Limpiar</button>
    </div>

    <div id="propiedades-container" class="propiedades-grid"></div>
    <div class="footer-texto">Real Estate System v2.0</div>
</div>

<!-- MODAL DETALLE -->
<div id="modalDetalle" class="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2 id="detalleTitulo"></h2>
            <span class="close" onclick="cerrarDetalle()">&times;</span>
        </div>
        <div id="detalleGaleria" class="detalle-galeria"></div>
        <div class="detalle-info">
            <div class="detalle-campo">
                <div class="detalle-campo-label">Precio</div>
                <div class="detalle-campo-valor" id="detallePrecio"></div>
            </div>
            <div class="detalle-campo">
                <div class="detalle-campo-label">Ubicación</div>
                <div class="detalle-campo-valor" id="detalleUbicacion"></div>
            </div>
        </div>
        <div id="detalleSpecs"></div>
        <div class="detalle-descripcion" id="detalleDescripcion"></div>
        <a id="btnWaDetalle" href="#" target="_blank" class="btn-wa-detalle">💬 Consultar esta propiedad por WhatsApp</a>
    </div>
</div>

<script>
    const propiedades = {{ propiedades_json | safe }};
    const whatsapp = "{{ whatsapp }}";
    const container = document.getElementById("propiedades-container");
    let detalleIdx = 0;
    const fotoActual = {};

    window.onclick = function(e) {
        if (e.target == document.getElementById("modalDetalle")) cerrarDetalle();
    }
    function cerrarDetalle() { document.getElementById("modalDetalle").style.display = "none"; }

    function parseImagenes(imagen_url) {
        try {
            const parsed = JSON.parse(imagen_url || '[]');
            return Array.isArray(parsed) ? parsed : [];
        } catch(e) {
            if (imagen_url && imagen_url.startsWith('http')) return [imagen_url];
            return [];
        }
    }

    function verDetalle(propId) {
        const prop = propiedades.find(p => p.id == propId);
        if (!prop) return;
        detalleIdx = 0;

        let imagenes = parseImagenes(prop.imagen_url);

        document.getElementById("detalleTitulo").textContent = prop.titulo;
        document.getElementById("detallePrecio").textContent = "$" + parseFloat(prop.precio).toLocaleString();
        document.getElementById("detalleUbicacion").textContent = "📍 " + prop.ubicacion;
        document.getElementById("detalleDescripcion").textContent = prop.descripcion || 'Sin descripción';
        document.getElementById("btnWaDetalle").href =
            `https://wa.me/${whatsapp}?text=Hola, me interesa la propiedad: ${encodeURIComponent(prop.titulo)} - $${parseFloat(prop.precio).toLocaleString()}`;

        const specsHTML = (prop.habitaciones || prop.banos || prop.metros2) ? `
            <div class="detalle-specs">
                ${prop.habitaciones ? `<span>🛏️ ${prop.habitaciones} hab.</span>` : ''}
                ${prop.banos ? `<span>🚿 ${prop.banos} baños</span>` : ''}
                ${prop.metros2 ? `<span>📐 ${prop.metros2} m²</span>` : ''}
            </div>` : '';
        document.getElementById("detalleSpecs").innerHTML = specsHTML;

        const galeriaEl = document.getElementById("detalleGaleria");
        if (imagenes.length > 0) {
            galeriaEl.innerHTML = imagenes.map((url, i) =>
                `<img src="${url}" class="${i===0?'activa':''}" alt="foto ${i+1}">`
            ).join('') + (imagenes.length > 1 ? `
                <button class="galeria-btn prev" onclick="cambiarDetalleImg(-1, ${imagenes.length})">‹</button>
                <button class="galeria-btn next" onclick="cambiarDetalleImg(1, ${imagenes.length})">›</button>
                <div class="contador-fotos">1/${imagenes.length}</div>` : '');
        } else {
            galeriaEl.innerHTML = `<div class="detalle-placeholder">🏠</div>`;
        }
        document.getElementById("modalDetalle").style.display = "block";
    }

    function cambiarDetalleImg(dir, total) {
        const galeria = document.getElementById("detalleGaleria");
        const imgs = galeria.querySelectorAll('img');
        const contador = galeria.querySelector('.contador-fotos');
        imgs[detalleIdx].classList.remove('activa');
        detalleIdx = (detalleIdx + dir + total) % total;
        imgs[detalleIdx].classList.add('activa');
        if (contador) contador.textContent = `${detalleIdx+1}/${total}`;
    }

    function aplicarFiltros() {
        const zona = document.getElementById('filtroZona').value.toLowerCase().trim();
        const min = parseFloat(document.getElementById('filtroPrecioMin').value) || 0;
        const max = parseFloat(document.getElementById('filtroPrecioMax').value) || Infinity;

        const filtradas = propiedades.filter(p => {
            const coincideZona = !zona || (p.ubicacion || '').toLowerCase().includes(zona);
            const precio = parseFloat(p.precio) || 0;
            const coincidePrecio = precio >= min && precio <= max;
            return coincideZona && coincidePrecio;
        });
        renderPropiedades(filtradas);
    }

    function limpiarFiltros() {
        document.getElementById('filtroZona').value = '';
        document.getElementById('filtroPrecioMin').value = '';
        document.getElementById('filtroPrecioMax').value = '';
        renderPropiedades(propiedades);
    }

    function renderPropiedades(lista) {
        if (!propiedades || propiedades.length === 0) {
            container.innerHTML = `
                <div class="vacio">
                    <div style="font-size: 64px; margin-bottom: 20px;">🏡</div>
                    <h2 style="color: #7f8c8d; margin-bottom: 10px;">No hay propiedades disponibles aún</h2>
                    <p>Contáctanos para más información</p>
                </div>`;
            return;
        }

        if (lista.length === 0) {
            container.innerHTML = `
                <div class="vacio">
                    <div style="font-size: 64px; margin-bottom: 20px;">🔍</div>
                    <h2 style="color: #7f8c8d; margin-bottom: 10px;">Sin resultados</h2>
                    <p>Prueba ajustando los filtros</p>
                </div>`;
            return;
        }

        container.innerHTML = lista.map(prop => {
            const imagenes = parseImagenes(prop.imagen_url);
            const galeriaHTML = imagenes.length > 0 ? `
                <div class="galeria" id="galeria-${prop.id}">
                    ${imagenes.map((url, i) => `<img src="${url}" class="${i===0?'activa':''}" alt="foto ${i+1}">`).join('')}
                    ${imagenes.length > 1 ? `
                        <button class="galeria-btn prev" onclick="event.stopPropagation();cambiarFoto('${prop.id}',-1)">‹</button>
                        <button class="galeria-btn next" onclick="event.stopPropagation();cambiarFoto('${prop.id}',1)">›</button>
                        <div class="galeria-nav">
                            ${imagenes.map((_,i)=>`<button class="galeria-dot ${i===0?'activo':''}" onclick="event.stopPropagation();irFoto('${prop.id}',${i})"></button>`).join('')}
                        </div>
                        <div class="contador-fotos">1/${imagenes.length}</div>` : ''}
                </div>` :
                `<div class="galeria"><div class="galeria-placeholder">🏠</div></div>`;

            const specsHTML = (prop.habitaciones || prop.banos || prop.metros2) ? `
                <div class="propiedad-specs">
                    ${prop.habitaciones ? `<span>🛏️ ${prop.habitaciones}</span>` : ''}
                    ${prop.banos ? `<span>🚿 ${prop.banos}</span>` : ''}
                    ${prop.metros2 ? `<span>📐 ${prop.metros2} m²</span>` : ''}
                </div>` : '';

            return `
                <div class="propiedad-card">
                    ${galeriaHTML}
                    <div class="propiedad-contenido">
                        <div class="propiedad-titulo">${prop.titulo}</div>
                        <div class="propiedad-precio">$${parseFloat(prop.precio).toLocaleString()}</div>
                        <div class="propiedad-ubicacion">📍 ${prop.ubicacion}</div>
                        ${specsHTML}
                        <span class="badge-disponible">✅ Disponible</span>
                        <div class="propiedad-descripcion">${prop.descripcion || ''}</div>
                        <div class="card-botones">
                            <button class="btn-ver-detalle" onclick="verDetalle(${prop.id})">🔍 Ver detalle</button>
                            <a href="https://wa.me/${whatsapp}?text=Hola, me interesa: ${encodeURIComponent(prop.titulo)}"
                               target="_blank" class="btn-consultar">💬 WhatsApp</a>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function cambiarFoto(propId, dir) {
        const galeria = document.getElementById(`galeria-${propId}`);
        const imgs = galeria.querySelectorAll('img');
        const dots = galeria.querySelectorAll('.galeria-dot');
        const contador = galeria.querySelector('.contador-fotos');
        if (!imgs.length) return;
        if (fotoActual[propId] === undefined) fotoActual[propId] = 0;
        imgs[fotoActual[propId]].classList.remove('activa');
        dots[fotoActual[propId]]?.classList.remove('activo');
        fotoActual[propId] = (fotoActual[propId] + dir + imgs.length) % imgs.length;
        imgs[fotoActual[propId]].classList.add('activa');
        dots[fotoActual[propId]]?.classList.add('activo');
        if (contador) contador.textContent = `${fotoActual[propId]+1}/${imgs.length}`;
    }

    function irFoto(propId, index) {
        const galeria = document.getElementById(`galeria-${propId}`);
        const imgs = galeria.querySelectorAll('img');
        const dots = galeria.querySelectorAll('.galeria-dot');
        const contador = galeria.querySelector('.contador-fotos');
        if (fotoActual[propId] === undefined) fotoActual[propId] = 0;
        imgs[fotoActual[propId]].classList.remove('activa');
        dots[fotoActual[propId]]?.classList.remove('activo');
        fotoActual[propId] = index;
        imgs[index].classList.add('activa');
        dots[index]?.classList.add('activo');
        if (contador) contador.textContent = `${index+1}/${imgs.length}`;
    }

    renderPropiedades(propiedades);
</script>
</body>
</html>
