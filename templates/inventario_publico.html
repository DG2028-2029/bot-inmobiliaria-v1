<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente_nombre }} - Propiedades Disponibles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 { color: #2c3e50; font-size: 24px; }
        .header p { color: #666; margin-top: 5px; }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background: #20ba5c; transform: translateY(-2px); }

        .propiedades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .propiedad-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .propiedad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .propiedad-imagen {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            overflow: hidden;
        }

        .propiedad-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .propiedad-contenido { padding: 20px; }

        .propiedad-titulo {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .propiedad-precio {
            font-size: 22px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .propiedad-ubicacion {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .propiedad-descripcion {
            color: #555;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .badge-disponible {
            display: inline-block;
            background: #eafaf1;
            color: #27ae60;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .btn-consultar {
            width: 100%;
            padding: 11px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: 0.3s;
        }
        .btn-consultar:hover { background: #20ba5c; }

        .vacio {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            color: #95a5a6;
            grid-column: 1/-1;
        }

        .footer-texto {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div>
            <h1>🏠 Propiedades Disponibles</h1>
            <p>{{ cliente_nombre }}</p>
        </div>
        <a href="https://wa.me/{{ whatsapp }}" target="_blank" class="btn-whatsapp">
            💬 Contactar por WhatsApp
        </a>
    </div>

    <div id="propiedades-container" class="propiedades-grid">
        <!-- cargado por JS -->
    </div>

    <div class="footer-texto">Real Estate System v2.0</div>
</div>

<script>
    const propiedades = {{ propiedades_json | safe }};
    const whatsapp = "{{ whatsapp }}";
    const container = document.getElementById("propiedades-container");

    if (!propiedades || propiedades.length === 0) {
        container.innerHTML = `
            <div class="vacio">
                <div style="font-size: 64px; margin-bottom: 20px;">🏡</div>
                <h2 style="color: #7f8c8d; margin-bottom: 10px;">No hay propiedades disponibles aún</h2>
                <p>Contáctanos para más información</p>
            </div>
        `;
    } else {
        container.innerHTML = propiedades.map(prop => `
            <div class="propiedad-card">
                <div class="propiedad-imagen">
                    ${prop.imagen_url
                        ? `<img src="${prop.imagen_url}" alt="${prop.titulo}" onerror="this.parentElement.innerHTML='🏠'">`
                        : '🏠'}
                </div>
                <div class="propiedad-contenido">
                    <div class="propiedad-titulo">${prop.titulo}</div>
                    <div class="propiedad-precio">$${parseFloat(prop.precio).toLocaleString()}</div>
                    <div class="propiedad-ubicacion">📍 ${prop.ubicacion}</div>
                    <span class="badge-disponible">✅ Disponible</span>
                    <div class="propiedad-descripcion">${prop.descripcion || ''}</div>
                    <a href="https://wa.me/${whatsapp}?text=Hola, me interesa la propiedad: ${encodeURIComponent(prop.titulo)} - $${parseFloat(prop.precio).toLocaleString()}"
                       target="_blank" class="btn-consultar">
                        💬 Consultar esta propiedad
                    </a>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
