<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — PropTech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: white; border-radius: 16px; padding: 44px 40px;
            max-width: 380px; width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2c3e50, #667eea);
            border-radius: 16px; display: flex; align-items: center;
            justify-content: center; font-size: 28px; margin: 0 auto 18px;
        }
        h2 { text-align: center; color: #2c3e50; font-size: 22px; margin-bottom: 6px; }
        p { text-align: center; color: #95a5a6; font-size: 13px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #2c3e50; margin-bottom: 6px; }
        input {
            width: 100%; padding: 13px 15px; border: 2px solid #ecf0f1;
            border-radius: 8px; font-size: 14px; background: #f8f9fa;
            font-family: inherit; transition: 0.2s;
        }
        input:focus { outline: none; border-color: #2c3e50; background: white; }
        button {
            width: 100%; padding: 13px; margin-top: 16px;
            background: linear-gradient(135deg, #2c3e50, #667eea);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(44,62,80,0.4); }
        .error {
            background: #fdf2f2; border: 1px solid #f5b7b1; color: #e74c3c;
            padding: 10px 14px; border-radius: 8px; font-size: 13px;
            text-align: center; margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h2>Panel de Admin</h2>
        <p>Acceso exclusivo para administradores</p>
        {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
        <form method="POST">
            <label>Contraseña de administrador</label>
            <input type="password" name="password" placeholder="••••••••••••" required autofocus>
            <button type="submit">Entrar al Panel</button>
        </form>
    </div>
</body>
</html>
