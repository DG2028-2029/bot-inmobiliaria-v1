<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente.nombre }} | Select Language</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo-icon {
            font-size: 50px;
            background: #f1f2f6;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 20px;
            margin: 0 auto 20px;
        }
        h2 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .languages-grid {
            display: grid;
            gap: 12px;
        }
        .btn-lang {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #ffffff;
            border: 1.5px solid #edf2f7;
            border-radius: 16px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-lang:hover {
            border-color: var(--accent);
            background: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
        }
        .flag-icon {
            font-size: 24px;
            margin-right: 15px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-icon">🏢</div>
        <h2>{{ cliente.nombre }}</h2>
        <p class="subtitle">{{ textos.selecciona_idioma }}</p>

        <div class="languages-grid">
            {% set next_page = destino if destino else 'formulario' %}
            
            <a href="{{ url_for('cambiar_idioma', lang='es', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇪🇸</span> {{ textos.btn_es }}
            </a>
            
            <a href="{{ url_for('cambiar_idioma', lang='en', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇺🇸</span> {{ textos.btn_en }}
            </a>

            <a href="{{ url_for('cambiar_idioma', lang='fr', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇫🇷</span> {{ textos.btn_fr }}
            </a>

            <a href="{{ url_for('cambiar_idioma', lang='de', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇩🇪</span> {{ textos.btn_de }}
            </a>

            <a href="{{ url_for('cambiar_idioma', lang='pt', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇵🇹</span> {{ textos.btn_pt }}
            </a>

            <a href="{{ url_for('cambiar_idioma', lang='zh', proximo=next_page, cliente_id=cliente.usuario) }}" class="btn-lang">
                <span class="flag-icon">🇨🇳</span> {{ textos.btn_zh }}
            </a>
        </div>

        <div class="footer-text">Real Estate System v2.0</div>
    </div>

</body>
</html>
