<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cliente.nombre }} | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .selector-idioma {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .bandera {
            font-size: 24px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .bandera:hover {
            transform: scale(1.3);
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 14px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #e8f4f8;
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.2);
        }

        .menu-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .menu-text {
            text-align: center;
            line-height: 1.3;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 22px;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="selector-idioma">
    <a href="{{ url_for('cambiar_idioma', lang='es', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇪🇸</a>
    <a href="{{ url_for('cambiar_idioma', lang='en', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇺🇸</a>
    <a href="{{ url_for('cambiar_idioma', lang='fr', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇫🇷</a>
    <a href="{{ url_for('cambiar_idioma', lang='de', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇩🇪</a>
    <a href="{{ url_for('cambiar_idioma', lang='pt', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇵🇹</a>
    <a href="{{ url_for('cambiar_idioma', lang='zh', proximo='seleccion_idioma', cliente_id=cliente.usuario) }}" class="bandera">🇨🇳</a>
</div>

<div class="container">
    <div class="header">
        <div class="logo-icon">🏢</div>
        <h1>{{ cliente.nombre }}</h1>
        <p class="subtitle">Sistema de Gestión Inmobiliaria Profesional</p>
    </div>

    <div class="menu-grid">
        <a href="{{ url_for('formulario', cliente_id=cliente.usuario) }}" class="menu-item">
            <div class="menu-icon">📝</div>
            <div class="menu-text">Nuevo Lead</div>
        </a>

        <a href="{{ url_for('historial', cliente_id=cliente.usuario) }}" class="menu-item">
            <div class="menu-icon">📋</div>
            <div class="menu-text">Historial</div>
        </a>

        <a href="{{ url_for('inventario', cliente_id=cliente.usuario) }}" class="menu-item">
            <div class="menu-icon">📦</div>
            <div class="menu-text">Inventario</div>
        </a>

        <a href="{{ url_for('stats', cliente_id=cliente.usuario) }}" class="menu-item">
            <div class="menu-icon">📊</div>
            <div class="menu-text">Estadísticas</div>
        </a>

        <a href="{{ url_for('herramientas', cliente_id=cliente.usuario) }}" class="menu-item">
            <div class="menu-icon">🧮</div>
            <div class="menu-text">Herramientas</div>
        </a>
    </div>

    <div class="divider"></div>

    <button class="logout-btn" onclick="logout()">🚪 Cerrar Sesión</button>

    <div class="footer-text">Real Estate System v2.0</div>
</div>

<script>
function logout() {
    if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
        window.location.href = "{{ url_for('login', cliente_id=cliente.usuario) }}";
    }
}
</script>

</body>
</html>
