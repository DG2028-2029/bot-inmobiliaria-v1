<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - {{ cliente.nombre }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        html, body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-y: auto;
        }
        
        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            min-height: 100vh;
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 40px;
            padding: 12px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .stats-header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }
        
        .stats-header h1 {
            font-size: 36px;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .periodo-label {
            color: white;
            text-align: center;
            font-size: 15px;
            margin-bottom: 15px;
        }
        
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }
        
        .filter-btn {
            padding: 12px 24px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .filter-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
            transition: 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 16px;
            font-weight: 500;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }
        
        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }
        
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="stats-container">
        <a href="{{ url_for('historial', cliente_id=cliente.usuario) }}" class="back-button">← Volver al Dashboard</a>
        
        <div class="stats-header">
            <h1>📊 Estadísticas - {{ cliente.nombre }}</h1>
            <div class="periodo-label">Período: <strong>{{ stats.periodo|capitalize }}</strong></div>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn {% if stats.periodo == 'semana' %}active{% endif %}" onclick="cambiarPeriodo('semana')">📅 1 Semana</button>
            <button class="filter-btn {% if stats.periodo == 'mes' %}active{% endif %}" onclick="cambiarPeriodo('mes')">📆 1 Mes</button>
            <button class="filter-btn {% if stats.periodo == 'año' %}active{% endif %}" onclick="cambiarPeriodo('año')">📊 1 Año</button>
            <button class="filter-btn {% if stats.periodo == 'todo' %}active{% endif %}" onclick="cambiarPeriodo('todo')">∞ Todo el tiempo</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total de Leads</div>
                <div class="stat-number">{{ stats.total_leads }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Leads Este Mes</div>
                <div class="stat-number">{{ stats.leads_este_mes }}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tasa de Conversión</div>
                <div class="stat-number">{{ stats.tasa_conversion }}%</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Leads por Zona</div>
                <div class="chart-container">
                    <canvas id="chartZonas"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Leads por Clasificación</div>
                <div class="chart-container">
                    <canvas id="chartClasificacion"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        function cambiarPeriodo(periodo) {
            window.location.href = "{{ url_for('stats', cliente_id=cliente.usuario) }}?periodo=" + periodo;
        }

        const statsData = {{ stats | tojson }};

        const ctxZonas = document.getElementById('chartZonas').getContext('2d');
        new Chart(ctxZonas, {
            type: 'bar',
            data: {
                labels: Object.keys(statsData.leads_por_zona),
                datasets: [{
                    label: 'Leads por Zona',
                    data: Object.values(statsData.leads_por_zona),
                    backgroundColor: '#667eea',
                    borderColor: '#667eea',
                    borderWidth: 1
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const ctxClasificacion = document.getElementById('chartClasificacion').getContext('2d');
        new Chart(ctxClasificacion, {
            type: 'doughnut',
            data: {
                labels: Object.keys(statsData.leads_por_clasificacion),
                datasets: [{
                    data: Object.values(statsData.leads_por_clasificacion),
                    backgroundColor: ['#28a745', '#ffc107', '#dc3545', '#17a2b8', '#6f42c1']
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false
            }
        });
    </script>
</body>
</html>
